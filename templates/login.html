<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:420px;
            border-radius:20px;
        }
    </style>
</head>

<body>

<div class="card shadow p-4">

    <h2 class="text-center mb-4">
        Identity Portal
    </h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert alert-warning">
            {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label>Email</label>
            <input
            type="email"
            name="email"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
            type="password"
            name="password"
            class="form-control"
            required>
        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <hr>

    <a href="/register"
       class="btn btn-success w-100">
       Create Account
    </a>

</div>

</body>
</html>
