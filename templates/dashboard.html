<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">

<h3>
Welcome {{ user['name'] }}
</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Name</label>

<input
class="form-control"
value="{{ user['name'] }}"
readonly>

</div>

<div class="col-md-6">

<label>Mobile</label>

<input
class="form-control"
value="{{ user['mobile'] }}"
readonly>

</div>

</div>

<br>

<div>

<label>Email</label>

<input
class="form-control"
value="{{ user['email'] }}"
readonly>

</div>

<hr>

<h4>
Upload Recent Color Photo
</h4>

<form
action="/upload_photo"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="photo"
class="form-control"
required>

<br>

<button class="btn btn-primary">
Upload Photo
</button>

</form>

<hr>

{% if user['photo'] %}

<h4>Current Photo</h4>

<img
src="{{ url_for('static', filename='uploads/' + user['photo']) }}"
width="250">

{% endif %}

<hr>

<a href="/logout"
class="btn btn-danger">
Logout
</a>

</div>

</div>

</div>

</body>
</html>
