<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>
Admin Dashboard
</h2>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Photo</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user['id'] }}</td>

<td>{{ user['name'] }}</td>

<td>{{ user['mobile'] }}</td>

<td>{{ user['email'] }}</td>

<td>

{% if user['photo'] %}

<img
src="{{ url_for('static', filename='uploads/' + user['photo']) }}"
width="80">

{% else %}

No Photo

{% endif %}

</td>

<td>

<a
href="/delete_user/{{ user['id'] }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/logout"
class="btn btn-dark">
Logout
</a>

</div>

</body>
</html>
