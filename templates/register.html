<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.register-box{
max-width:550px;
margin:auto;
margin-top:50px;
}

</style>

</head>

<body>

<div class="container">

<div class="card register-box shadow">

<div class="card-body">

<h2 class="text-center mb-4">
User Registration
</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone Number</label>

<input
type="text"
name="mobile"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-success w-100">
Register
</button>

</form>

<hr>

<a href="/login"
class="btn btn-secondary w-100">
Back To Login
</a>

</div>

</div>

</div>

</body>
</html>
